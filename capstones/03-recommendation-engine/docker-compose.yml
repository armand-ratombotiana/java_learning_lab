version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  recommendation-engine:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/recommendations
      SPRING_DATA_REDIS_HOST: redis

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"