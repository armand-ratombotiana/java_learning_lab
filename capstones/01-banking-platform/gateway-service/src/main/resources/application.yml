spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/accounts/**
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/transfers/**
        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/users/**
server:
  port: 8080