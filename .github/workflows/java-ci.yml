name: Java CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx2g -XX:+UseG1GC

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Display Java version
      run: java -version

    - name: Build with Maven
      run: mvn clean verify -B -V -T 1C
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Generate JaCoCo coverage report
      run: mvn jacoco:report -B -q

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-reports
        path: '**/target/site/jacoco/'
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/target/surefire-reports/*.xml'
        retention-days: 14

    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/target/surefire-reports/**/*.xml'
        check_name: 'Unit Test Results'
        comment_title: 'Test Results'
        comment_mode: 'always'

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Checkstyle
      run: mvn checkstyle:check -B
      continue-on-error: true

    - name: Run PMD analysis
      run: mvn pmd:check -B
      continue-on-error: true

    - name: Run SpotBugs
      run: mvn spotbugs:check -B
      continue-on-error: true

    - name: Upload Checkstyle results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: checkstyle-results
        path: '**/target/checkstyle-result.xml'
        retention-days: 7

    - name: Upload PMD results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pmd-results
        path: '**/target/pmd.xml'
        retention-days: 7

    - name: Upload SpotBugs results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-results
        path: '**/target/spotbugsXml.xml'
        retention-days: 7

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -B -q
      continue-on-error: true

    - name: Upload OWASP report
      uses: actions/upload-artifact@v4
      with:
        name: owasp-report
        path: '**/dependency-check-report.xml'
        retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Check outdated dependencies
      run: mvn versions:display-dependency-updates -B -q
      continue-on-error: true

    - name: Check outdated plugins
      run: mvn versions:display-plugin-updates -B -q
      continue-on-error: true

  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: SonarQube Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        mvn sonar:sonar \
          -B \
          -Dsonar.projectKey=java-learning-lab \
          -Dsonar.projectName="Java Learning Lab" \
          -Dsonar.host.url="${SONAR_HOST_URL:-https://sonarcloud.io}" \
          -Dsonar.token="${SONAR_TOKEN}" \
          -Dsonar.java.source=21 \
          -Dsonar.java.binaries=**/target/classes \
          -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Download coverage reports
      uses: actions/download-artifact@v4
      with:
        name: jacoco-reports
        path: jacoco-reports

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: '**/jacoco.xml'
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true

    - name: Add coverage comment to PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = 'jacoco-reports';
          if (fs.existsSync(path)) {
            const comment = `## Code Coverage Report\nCoverage reports generated. View details in the artifacts.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
        result-ignore-error: true