name: Maven Release & Publish

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: -Xmx3g -XX:+UseG1GC

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Display Java version
      run: java -version

    - name: Configure git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

    - name: Determine release version
      id: version
      run: |
        if [ "${{ github.event.inputs.release_version }}" != "" ]; then
          echo "version=${{ github.event.inputs.release_version }}" >> $GITHUB_OUTPUT
        else
          echo "version=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
        fi

    - name: Update version in POM
      run: |
        mvn versions:set -B -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

    - name: Build and test
      run: mvn clean verify -B -V -T 1C
      env:
        MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

    - name: Generate JaCoCo coverage
      run: mvn jacoco:report -B -q

    - name: Run quality checks
      run: |
        mvn checkstyle:check -B -q
        mvn pmd:check -B -q
        mvn spotbugs:check -B -q
      continue-on-error: true

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}
        release_name: Release v${{ steps.version.outputs.version }}
        draft: true
        prerelease: false

    - name: Publish to GitHub Packages
      run: mvn deploy -B -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./target/site/jacoco/jacoco.xml
        asset_name: jacoco-coverage.xml
        asset_content_type: application/xml

    - name: Commit version update
      run: |
        git add -A
        git commit -m "Release: v${{ steps.version.outputs.version }}"
        git tag v${{ steps.version.outputs.version }}
        git push origin main --tags

  publish-snapshots:
    name: Publish Snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Publish snapshot artifacts
      run: mvn deploy -B -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}