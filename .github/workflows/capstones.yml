name: Build All Capstones

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Validate project structure
      run: |
        for dir in capstones/*/; do
          echo "Checking $dir..."
          if [ -f "$dir/pom.xml" ]; then
            echo "Found pom.xml in $dir"
          fi
          if [ -f "$dir/README.md" ]; then
            echo "Found README.md in $dir"
          fi
          if [ -f "$dir/Dockerfile" ]; then
            echo "Found Dockerfile in $dir"
          fi
        done

  build-01-banking:
    needs: validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build banking platform
      run: mvn -f capstones/01-banking-platform/pom.xml clean compile -DskipTests

