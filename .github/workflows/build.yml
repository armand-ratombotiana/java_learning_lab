name: Java Build & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [21]
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven

    - name: Display Java version
      run: java -version

    - name: Build with Maven (all modules)
      run: mvn clean verify -B -V -T 1C
      env:
        MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

    - name: Generate JaCoCo coverage report
      run: mvn jacoco:report -B -q
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true
      continue-on-error: true

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: '**/target/surefire-reports/**/*.xml'
        check_name: 'Unit Test Results'
      continue-on-error: true

  quality:
    name: Code Quality & Analysis
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Run Checkstyle
      run: mvn checkstyle:check -B -q -DfailOnViolation=true
      continue-on-error: true

    - name: Run PMD
      run: mvn pmd:check -B -q
      continue-on-error: true

    - name: Run SpotBugs
      run: mvn spotbugs:check -B -q
      continue-on-error: true

    - name: Dependency vulnerability scan (OWASP)
      run: |
        mvn dependency-check:check -B -q || echo "Vulnerabilities found - review required"
      continue-on-error: true

  dependency-check:
    name: Dependency & Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Check for outdated dependencies
      run: mvn versions:display-dependency-updates -B -q
      continue-on-error: true
    
    - name: Check for outdated plugins
      run: mvn versions:display-plugin-updates -B -q
      continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:6
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Run Integration Tests (IT tests)
      run: mvn verify -B -q -Pintegration-tests
      continue-on-error: true

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [build, quality]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.build.result }}" = "failure" ]; then
          echo "Build failed"
          exit 1
        fi
    
    - name: Notify success
      if: success()
      run: echo "✅ All checks passed!"
