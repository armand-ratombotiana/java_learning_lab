name: Code Coverage Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Build and test with coverage
      run: mvn clean verify -B -DskipTests=false
      continue-on-error: true

    - name: Collect coverage reports
      run: |
        mkdir -p coverage-reports
        find . -path "*/target/site/jacoco/index.html" -exec dirname {} \; | xargs -I {} cp -r {} coverage-reports/
      continue-on-error: true

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v3
      with:
        name: coverage-reports
        path: coverage-reports/
        retention-days: 30
      continue-on-error: true

    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        verbose: true
      continue-on-error: true

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverageReportPath = './target/site/jacoco/index.html';
          if (fs.existsSync(coverageReportPath)) {
            const comment = `## 📊 Code Coverage Report\nCoverage report updated. Check the artifacts for detailed coverage information.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
      continue-on-error: true
