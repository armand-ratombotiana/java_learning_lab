# GraalVM Native Image Projects

This directory contains hands-on projects using GraalVM Native Image for creating native executables from Java applications. Native image provides near-instant startup and minimal memory footprint.

## Project Overview

GraalVM Native Image compiles Java bytecode ahead-of-time to create a native executable. This module covers two projects demonstrating different Native Image use cases.

---

# Mini-Project: Simple Native HTTP Service (2-4 Hours)

## Project Description

Build a simple HTTP service compiled to native image. This project demonstrates Native Image configuration, reflection handling, and build optimization.

## Technologies Used

- GraalVM 23.x
- Native Image
- Java 21
- Maven
- Simple HTTP server

## Implementation Steps

### Step 1: Create Project Structure

```bash
mkdir graalvm-http-service
cd graalvm-http-service
mkdir -p src/main/java/com/learning/http/{config,handler}
mkdir -p src/main/resources/META-INF/native-image
mkdir -p src/main/resources
```

