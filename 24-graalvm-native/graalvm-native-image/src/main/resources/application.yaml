### Step 5: Create Service

```java
package com.learning.app.service;

import com.learning.app.User;
import com.learning.app.UserRepository;
import org.springframework.stereotype.Service;
import reactor.core.publisher.Flux;
import reactor.core.publisher.Mono;
import java.time.LocalDateTime;
import java.util.UUID;

@Service
public class UserService {
    
    private final UserRepository userRepository;
    
    public UserService(UserRepository userRepository) {
        this.userRepository = userRepository;
    }
    
    public Mono<User> createUser(User user) {
        user.setId(null);
        user.setPassword(UUID.randomUUID().toString());
        user.setEnabled(true);
        user.setCreatedAt(LocalDateTime.now());
        user.setUpdatedAt(LocalDateTime.now());
        
        return userRepository.save(user);
    }
    
    public Mono<User> getUserById(Long id) {
        return userRepository.findById(id);
    }
    
    public Mono<User> getUserByUsername(String username) {
        return userRepository.findByUsername(username);
    }
    
    public Flux<User> getAllUsers() {
        return userRepository.findAll();
    }
    
    public Mono<User> updateUser(Long id, User userUpdate) {
        return userRepository.findById(id)
            .flatMap(user -> {
                user.setUsername(userUpdate.getUsername());
                user.setEmail(userUpdate.getEmail());
                user.setEnabled(userUpdate.isEnabled());
                user.setUpdatedAt(LocalDateTime.now());
                
                return userRepository.save(user);
            });
    }
    
    public Mono<Void> deleteUser(Long id) {
        return userRepository.deleteById(id);
    }
}
```

### Step 6: Create Controller

```java
package com.learning.app.controller;

import com.learning.app.User;
import com.learning.app.service.UserService;
import org.springframework.http.HttpStatus;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.*;
import reactor.core.publisher.Flux;
import reactor.core.publisher.Mono;
import java.util.Map;

@RestController
@RequestMapping("/api/users")
public class UserController {
    
    private final UserService userService;
    
    public UserController(UserService userService) {
        this.userService = userService;
    }
    
    @PostMapping
    public Mono<ResponseEntity<User>> createUser(@RequestBody User user) {
        return userService.createUser(user)
            .map(created -> ResponseEntity
                .status(HttpStatus.CREATED)
                .body(created));
    }
    
    @GetMapping("/{id}")
    public Mono<ResponseEntity<User>> getUser(@PathVariable Long id) {
        return userService.getUserById(id)
            .map(ResponseEntity::ok)
            .defaultIfEmpty(ResponseEntity.notFound().build());
    }
    
    @GetMapping
    public Flux<User> getAllUsers() {
        return userService.getAllUsers();
    }
    
    @PutMapping("/{id}")
    public Mono<ResponseEntity<User>> updateUser(
            @PathVariable Long id,
            @RequestBody User user) {
        
        return userService.updateUser(id, user)
            .map(ResponseEntity::ok)
            .defaultIfEmpty(ResponseEntity.notFound().build());
    }
    
    @DeleteMapping("/{id}")
    public Mono<ResponseEntity<Void>> deleteUser(@PathVariable Long id) {
        return userService.deleteUser(id)
            .thenReturn(ResponseEntity.noContent().build())
            .defaultIfEmpty(ResponseEntity.notFound().build());
    }
    
    @GetMapping("/count")
    public Mono<Map<String, Long>> countUsers() {
        return userService.getAllUsers()
            .count()
            .map(c -> Map.of("count", c));
    }
}
```

