### Step 3: Create HTTP Handler

```java
package com.learning.http.handler;

import com.sun.net.httpserver.*;
import java.io.*;
import java.net.InetSocketAddress;
import java.util.HashMap;
import java.util.Map;

public class HttpServer {
    
    private final com.sun.net.httpserver.HttpServer server;
    private final Map<String, Handler> routes;
    
    public HttpServer(int port) throws IOException {
        this.server = com.sun.net.httpserver.HttpServer.create(
            new InetSocketAddress(port), 0);
        this.routes = new HashMap<>();
        
        setupRoutes();
    }
    
    private void setupRoutes() {
        server.createContext("/api/status", exchange -> {
            String response = "{\"status\":\"UP\",\"timestamp\":" + 
                System.currentTimeMillis() + "}";
            
            exchange.getResponseHeaders().set(
                "Content-Type", "application/json");
            exchange.sendResponseHeaders(200, response.getBytes().length);
            
            try (OutputStream os = exchange.getResponseBody()) {
                os.write(response.getBytes());
            }
        });
        
        server.createContext("/api/echo", exchange -> {
            String path = exchange.getRequestURI().getPath();
            Map<String, Object> response = new HashMap<>();
            response.put("path", path);
            response.put("method", exchange.getRequestMethod());
            response.put("headers", exchange.getRequestHeaders());
            
            String json = toJson(response);
            byte[] bytes = json.getBytes();
            
            exchange.getResponseHeaders().set(
                "Content-Type", "application/json");
            exchange.sendResponseHeaders(200, bytes.length);
            
            try (OutputStream os = exchange.getResponseBody()) {
                os.write(bytes);
            }
        });
        
        server.createContext("/", exchange -> {
            String response = "GraalVM HTTP Service";
            byte[] bytes = response.getBytes();
            
            exchange.sendResponseHeaders(200, bytes.length);
            
            try (OutputStream os = exchange.getResponseBody()) {
                os.write(bytes);
            }
        });
    }
    
    public void start() {
        server.setExecutor(null);
        server.start();
        System.out.println("HTTP Server started on port " + 
            server.getAddress().getPort());
    }
    
    public void stop() {
        server.stop(0);
    }
    
    private String toJson(Map<String, Object> map) {
        StringBuilder sb = new StringBuilder("{");
        int i = 0;
        
        for (Map.Entry<String, Object> entry : map.entrySet()) {
            if (i > 0) sb.append(",");
            sb.append("\"")
              .append(entry.getKey())
              .append("\":\"")
              .append(entry.getValue())
              .append("\"");
            i++;
        }
        
        sb.append("}");
        return sb.toString();
    }
    
    public int getPort() {
        return server.getAddress().getPort();
    }
}
```

### Step 4: Create Main Application

```java
package com.learning.http;

import com.learning.http.handler.HttpServer;

public class Main {
    
    public static void main(String[] args) {
        int port = Integer.parseInt(
            System.getProperty("server.port", "8080"));
        
        try {
            HttpServer server = new HttpServer(port);
            server.start();
            
            Runtime.getRuntime().addShutdownHook(new Thread(() -> {
                System.out.println("Shutting down...");
                server.stop();
            }));
            
        } catch (Exception e) {
            System.err.println("Failed to start server: " + 
                e.getMessage());
            System.exit(1);
        }
    }
}
```

### Step 5: Create Native Image Configuration

Create `src/main/resources/META-INF/native-image/http-service.properties`:

```properties
# GraalVM native image configuration
# Classpath resources
+classpath=

# Reflection configuration
# Enable reflection for Sun HTTP server classes
+reflect=com.sun.net.httpserver.*
```

Create `src/main/resources/META-INF/native-image/reflection.json`:

```json
[
    {
        "name": "com.sun.net.httpserver.SimpleFileServer$Files",
        "allPublicConstructors": true,
        "allPublicMethods": true
    },
    {
        "name": "com.sun.net.httpserver.HttpServer",
        "allPublicConstructors": true,
        "allPublicMethods": true
    },
    {
        "name": "com.sun.net.httpserver.Headers",
        "allPublicConstructors": true
    }
]
```

Create `src/main/resources/META-INF/native-image/proxy-config.json`:

```json
[
    {
        "kind": "Proxy",
        "interfaces": [
            "com.sun.net.httpserver.Handler",
            "com.sun.net.httpserver.Filter"
        ]
    }
]
```

### Step 6: Build and Run

```bash
# Build native image
cd graalvm-http-service

# Build with GraalVM native image
./mvnw -Pnative native:build

# Or using GraalVM directly
native-image -cp target/graalvm-http-service-1.0.0.jar \
    --report-unsupported-elements-at-runtime \
    -H:Name=http-service \
    -H:+ReportExceptionStackTraces \
    --no-fallback \
    -cp target/classes

# Run native executable
./http-service

# Test
curl http://localhost:8080/api/status
curl http://localhost:8080/api/echo
```

### Step 7: Compare Performance

```bash
# Measure startup time
time java -jar target/graalvm-http-service-1.0.0.jar &
time ./http-service

# Compare memory usage
ps -o pid,rss,vsz,comm -p <PID>
```

## Expected Output

- Native executable under 30MB
- Sub-second startup
- Minimal memory footprint

