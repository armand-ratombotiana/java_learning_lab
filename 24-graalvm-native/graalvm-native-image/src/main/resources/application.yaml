# Real-World Project: Spring Boot Native Application (8+ Hours)

## Project Description

Build a complete Spring Boot application compiled to native image. This project demonstrates Spring Boot Native Image support, data access, and Reactive Web with native compilation.

## Architecture

```
┌─────────────────────────────────────┐
│   Spring Boot Native Application     │
├─────────────────────────────────────┤
│  - WebFlux (Reactive)               │
│  - R2DBC (Reactive DB)             │
│  - Security                       │
│  - Actuator                        │
└─────────────────────────────────────┘
```

