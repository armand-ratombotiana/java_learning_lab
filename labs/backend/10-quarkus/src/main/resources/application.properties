# Quarkus application configuration
quarkus.http.port=8080
quarkus.application.name=quarkus-lab
quarkus.application.version=1.0.0

# Datasource (H2 in-memory for demo — use PostgreSQL in production)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:quarkusdb
quarkus.datasource.jdbc.driver=org.h2.Driver

# Hibernate / Panache
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.learning.backend10".level=DEBUG
