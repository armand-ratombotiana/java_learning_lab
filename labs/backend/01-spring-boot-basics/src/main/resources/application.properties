# ===================================================================
# Spring Boot Basics — application.properties
#
# This file demonstrates how Spring Boot externalizes configuration.
# Properties are loaded automatically by Spring at startup and override
# default values provided in the code.
# ===================================================================

# Server configuration
server.port=8080

# Application custom properties
app.greeting=Hello from Spring Boot 3!
app.version=3.3.0

# Type-safe configuration properties (used by AppConfig.AppSettings)
app.settings.name=SpringBootBasicsLab
app.settings.port=8080
app.settings.features[0]=caching
app.settings.features[1]=scheduling
app.settings.features[2]=monitoring

# Logging level for our package
logging.level.com.learning.backend01=INFO

# Actuator endpoints (if spring-boot-starter-actuator is on classpath)
management.endpoints.web.exposure.include=health,info
