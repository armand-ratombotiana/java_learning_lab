spring:
  application:
    name: performance-lab
  datasource:
    url: jdbc:h2:mem:perfdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 2000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

server:
  port: 8080

logging:
  level:
    com.learning.backend24: DEBUG
