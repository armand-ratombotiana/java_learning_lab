# Healthcare Pipeline Configuration

# Input Files
input.patients=data/patients_raw.csv
input.insurance=data/insurance_providers.csv
input.icd10=data/icd10_codes.csv
input.cpt=data/cpt_codes.csv

# Output Directory
output.dir=output

# Logging
log.level=INFO
log.file=logs/healthcare_pipeline.log

# Notifications
notification.email=admin@hospital.org
notification.on_failure=true

# Processing
processing.chunk_size=10000
processing.parallel=true
processing.max_threads=4

# Validation Rules
validation.required_fields=mrn,last_name,dob,gender
validation.date_formats=MM/dd/yyyy,yyyy-MM-dd,dd-MMM-yyyy
validation.state_codes=CA,TX,NY,FL,AZ,CO,WA,OR,MA,IL,PA,GA,NC,TN,OH,MI,MN,MO,MD,WI,NV